# ============================================================
# Binance USDS-M Futures trading engine configuration
#
# Philosophy: risk-first. Every limit in here is a hard gate —
# if any check fails, the correct action is NO TRADE.
# ============================================================

# testnet -> Binance futures testnet (fake money, needs testnet keys)
# paper   -> simulated fills on live market data (no keys needed)
# live    -> real money (requires typed confirmation at startup)
mode: testnet

trading:
  symbols: [BTC/USDT, ETH/USDT]
  timeframe: 15m           # execution timeframe
  trend_timeframe: 1h      # higher timeframe for trend context
  leverage: 3
  margin_mode: isolated    # isolated caps damage to the position's margin

strategy:
  # Confluence: a trade needs BOTH enough weighted confidence and enough
  # independent factors agreeing. Anything less is NO_TRADE.
  min_confidence: 0.60         # 0..1 weighted alignment score
  min_aligned_factors: 4       # independent factors agreeing with direction

  # Factor weights (0 disables a factor)
  weights:
    trend_htf: 2.0             # higher-timeframe trend (most important)
    trend_ltf: 1.5             # execution-timeframe trend
    structure: 1.5             # higher-highs/lows market structure
    momentum: 1.0              # RSI regime
    breakout: 1.0              # range breakout confirmation
    volume: 1.0                # volume expansion behind the move
    sr_room: 1.0               # room to nearest S/R level vs stop distance
    mean_reversion: 1.0        # overextension guard (votes against chasing)
    funding: 0.5               # crowded-side penalty from funding rate
    open_interest: 0.5         # OI confirming the move
    book_imbalance: 0.5        # top-of-book bid/ask depth imbalance

  # Indicator parameters
  ema_fast: 20
  ema_slow: 50
  trend_ema_fast: 20           # on trend_timeframe
  trend_ema_slow: 50
  rsi_period: 14
  atr_period: 14
  breakout_lookback: 20        # bars defining the range to break
  swing_lookback: 60           # bars scanned for swings / structure / S-R
  swing_window: 3              # bars each side to confirm a swing point
  volume_ma: 20
  volume_expansion: 1.3        # last volume >= this x average
  extension_atr_max: 3.0       # price further than this from slow EMA = chasing
  book_depth_levels: 10        # order book levels for imbalance
  book_imbalance_ratio: 1.3    # bid/ask depth ratio to count as a vote

  # Hard gates (any failure vetoes the trade regardless of score)
  min_atr_pct: 0.10            # ATR as % of price; below = dead market
  max_atr_pct: 3.00            # above = chaos, stand aside
  max_funding_against: 0.0010  # skip if paying > 0.10% funding against us
  btc_filter: true             # alts may only trade with BTC's HTF trend

exits:
  stop_atr_mult: 1.5           # initial stop distance in ATRs
  tp1_r: 1.0                   # first target at 1R...
  tp1_fraction: 0.5            # ...closing 50% of the position
  tp2_r: 2.5                   # final target
  breakeven_at_r: 1.0          # move stop to entry once +1R reached
  trail_atr_mult: 2.0          # then trail the rest by 2 ATRs
  trail_min_step_pct: 0.05     # only replace the stop if it improves >= 0.05%
  exit_on_opposing_signal: true  # close early if a confident opposite signal fires

# All percentages are of account equity, so limits scale with capital.
risk:
  risk_per_trade_pct: 0.5      # equity lost if the initial stop is hit
  max_leverage: 5
  max_open_positions: 2
  max_symbol_exposure_mult: 1.0   # per-symbol notional <= equity x this
  max_total_exposure_mult: 2.0    # sum of notionals <= equity x this
  daily_max_loss_pct: 1.5      # realized; stop opening trades for the day
  daily_profit_target_pct: 2.0 # bank the day when reached (0 disables)
  weekly_max_drawdown_pct: 4.0 # from week-start equity; halts for the week
  max_consecutive_losses: 3    # halts for the day after this many in a row
  max_trades_per_day: 6
  min_risk_reward: 1.5         # blended RR across TP1/TP2 must beat this
  max_spread_pct: 0.05         # bid/ask spread gate
  min_quote_volume_24h: 100000000  # USDT; liquidity gate per symbol
  min_book_depth_mult: 20      # top-of-book depth >= order size x this

# Shadow learning track: a complete twin of the trading pipeline — same risk
# checks, sizing, fees, slippage, breakeven/trailing management — running at
# relaxed thresholds on a VIRTUAL account against real market prices. It can
# never touch money; its trades only feed the research dataset.
shadow:
  enabled: true
  min_confidence: 0.35         # relaxed vs the strict 0.60
  min_aligned_factors: 2       # relaxed vs the strict 4
  start_balance: 1000          # virtual USDT the shadow account trades
  paper_state_file: shadow_paper_state.json
  risk_state_file: shadow_risk_state.json

execution:
  slippage_pct: 0.02           # assumed slippage per market order (sizing + backtest)
  taker_fee_pct: 0.05          # Binance USDS-M taker fee

# Event guard: the bot's ears on the world. Sudden world events show up as
# violent candles before any news feed can report them — the shock detector
# stands aside when one prints. For events known in advance (Fed decisions,
# CPI releases), add blackout windows and no new trades open inside them.
events:
  shock_atr_mult: 3.0          # candle range >= 3x ATR = something happened
  shock_cooldown_minutes: 60   # stand aside this long after a shock
  blackouts: []
  # example:
  # blackouts:
  #   - {start: "2026-07-29T17:30:00Z", end: "2026-07-29T19:30:00Z", label: "FOMC"}
  #   - {start: "2026-08-12T12:00:00Z", end: "2026-08-12T13:30:00Z", label: "US CPI"}

# Telegram: the bot messages your phone (startup, trades, daily halts,
# outages, shutdown) and obeys /status /kill /help from the configured chat.
# Secrets go in .env: TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID.
telegram:
  enabled: true
  notify_shadow: false   # also message about virtual shadow-track trades

bot:
  poll_seconds: 30
  state_file: bot_state.json       # risk counters + managed positions
  paper_state_file: paper_state.json
  journal_file: journal.jsonl      # structured audit log of every decision
  kill_file: KILL                  # touch this file to trigger emergency stop
  close_positions_on_kill: true    # kill switch also flattens all positions
  max_stale_data_seconds: 180      # halt new entries if data older than this
  datastore_file: market_data.db   # research dataset: snapshots, decisions, outcomes
